<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:sans-serif;}
input{padding:10px;margin:5px;width:80%;border:none;border-radius:5px;}
button{padding:10px 20px;background:red;color:white;border:none;border-radius:5px;}
</style>
</head>

<body>

<h2>🔥 Admin Panel</h2>

<input type="text" id="title" placeholder="Title"><br>
<input type="text" id="type" placeholder="Category"><br>
<input type="text" id="link" placeholder="Download Link"><br>

<button onclick="addItem()">Add Item</button>

<script>
function addItem(){
  let title = document.getElementById("title").value;
  let type = document.getElementById("type").value;
  let link = document.getElementById("link").value;

  let items = JSON.parse(localStorage.getItem("items")) || [];

  items.push({title, type, link});

  localStorage.setItem("items", JSON.stringify(items));

  alert("Item Added ✅");

  document.getElementById("title").value="";
  document.getElementById("type").value="";
  document.getElementById("link").value="";
}
</script>

</body>
</html>
