<!DOCTYPE html>
<html>
<head>
  <title>Polash Wapka Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background:#0d0d0d;
      color:white;
      font-family:Arial;
      margin:0;
    }

    .header {
      background:linear-gradient(red,darkred);
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .menu {
      background:#111;
      padding:10px;
      text-align:center;
    }

    .menu a {
      color:white;
      margin:8px;
      text-decoration:none;
    }

    .container {
      padding:10px;
    }

    .card {
      background:#1c1c1c;
      margin:10px 0;
      padding:10px;
      border-radius:10px;
      display:flex;
      gap:10px;
    }

    .card img {
      width:100px;
      height:80px;
      border-radius:5px;
    }

    .btn {
      display:inline-block;
      background:green;
      padding:6px 12px;
      margin-top:5px;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }

    .footer {
      text-align:center;
      padding:15px;
      background:#111;
      margin-top:20px;
      font-size:14px;
    }
  </style>

<script>
function loadData(){
  let data = JSON.parse(localStorage.getItem("items")) || [];
  let container = document.getElementById("data");

  data.forEach(item=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="https://via.placeholder.com/100x80">
      <div>
        <h4>${item.title}</h4>
        <p>${item.type}</p>
        <a href="${item.link}" class="btn">⬇ Download</a>
      </div>
    `;

    container.appendChild(div);
  });
}
</script>

</head>

<body onload="loadData()">

<div class="header">🔥 Polash Wapka Site</div>

<div class="menu">
  
  <a href="index.html">Home</a>
  <a href="admin.html">Admin</a>
</div> 
  <div id="data"></div>

<div class="container" id="data">
</div>

<div class="footer">
  © 2026 Polash Site | All Rights Reserved
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDD...", 
  authDomain: "polashsite.firebaseapp.com",
  projectId: "polashsite",
  storageBucket: "polashsite.appspot.com",
  messagingSenderId: "128802637163",
  appId: "1:128802637163:web:xxxx"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

db.collection("items").get().then((snapshot)=>{
  snapshot.forEach((doc)=>{
    let item = doc.data();

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <h3>${item.title}</h3>
      <a href="${item.link}" class="btn">⬇ Download</a>
    `;

    document.getElementById("data").appendChild(div);
  });
}); <div id="data"></div>
</script>
</body> <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

</html>
