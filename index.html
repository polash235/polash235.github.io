<!DOCTYPE html>
<html>
<head>
<title>Polash Wapka Site</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif;}
.header{background:red;padding:10px;text-align:center;font-weight:bold;}
.item{background:#111;margin:10px;padding:10px;border-radius:5px;}
a{color:yellow;}
</style>
</head>

<body>

<div class="header">🔥 Polash Wapka Site</div>

<div id="content"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || [];

let html = "";

items.reverse().forEach(item=>{
  html += `
  <div class="item">
    <h3>${item.title}</h3>
    <p>Category: ${item.type}</p>
    <a href="${item.link}" target="_blank">Download</a>
  </div>
  `;
});

document.getElementById("content").innerHTML = html;
</script>

</body>
</html>
